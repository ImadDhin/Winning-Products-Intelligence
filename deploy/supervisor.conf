; Winning Products - Supervisor queue workers
; Place in /etc/supervisor/conf.d/ or include from main config

[program:winning-connectors]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/winning-products/artisan queue:work redis --queue=connectors --tries=3 --max-time=3600
autostart=true
autorestart=true
numprocs=2
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/winning-connectors.log

